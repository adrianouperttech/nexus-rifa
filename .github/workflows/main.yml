on:
  push:
    branches:
      - main

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  deploy_to_inactive:
    name: Deploy to Inactive Environment
    runs-on: ubuntu-latest
    needs: build_and_test
    outputs:
      inactive_env: ${{ steps.get_env.outputs.inactive_env }}
      active_env: ${{ steps.get_env.outputs.active_env }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Determine Environments
        id: get_env
        run: |
          # Check if the file exists and if its content is "blue"
          if [[ -f ./.active_env && $(cat ./.active_env) == "blue" ]]; then
            echo "inactive_env=green" >> $GITHUB_OUTPUT
            echo "active_env=blue" >> $GITHUB_OUTPUT
          else
            echo "inactive_env=blue" >> $GITHUB_OUTPUT
            echo "active_env=green" >> $GITHUB_OUTPUT
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Migrations on Blue DB
        if: steps.get_env.outputs.inactive_env == 'blue'
        env:
          DB_HOST: ${{ secrets.DB_HOST_BLUE }}
          DB_PORT: ${{ secrets.DB_PORT_BLUE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME_BLUE }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_BLUE }}
          DB_DATABASE: ${{ secrets.DB_DATABASE_BLUE }}
        run: |
          echo "Running migrations on the blue database..."
          npm run migration:run

      - name: Run Migrations on Green DB
        if: steps.get_env.outputs.inactive_env == 'green'
        env:
          DB_HOST: ${{ secrets.DB_HOST_GREEN }}
          DB_PORT: ${{ secrets.DB_PORT_GREEN }}
          DB_USERNAME: ${{ secrets.DB_USERNAME_GREEN }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_GREEN }}
          DB_DATABASE: ${{ secrets.DB_DATABASE_GREEN }}
        run: |
          echo "Running migrations on the green database..."
          npm run migration:run

      - name: Deploy to Blue Server
        if: steps.get_env.outputs.inactive_env == 'blue'
        run: |
          echo "Deploying to BLUE server..."
          # Example using SSH with the specific secret for the blue server:
          # ssh user@${{ secrets.SERVER_HOST_BLUE }} 'cd /var/www/app && git pull && npm install --production && pm2 restart app_name'
          echo "Deployment to blue completed."

      - name: Deploy to Green Server
        if: steps.get_env.outputs.inactive_env == 'green'
        run: |
          echo "Deploying to GREEN server..."
          # Example using SSH with the specific secret for the green server:
          # ssh user@${{ secrets.SERVER_HOST_GREEN }} 'cd /var/www/app && git pull && npm install --production && pm2 restart app_name'
          echo "Deployment to green completed."

  wait_for_approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: deploy_to_inactive
    environment:
      name: production
    steps:
      - name: Request manual approval to switch traffic
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: <YOUR_GITHUB_USERNAME> # ----------------- TO DO -----------------
          minimum-approvals: 1
          issue-title: "🚀 Deploy Blue/Green: Approve traffic switch to ${{ needs.deploy_to_inactive.outputs.inactive_env }}"
          issue-body: |
            Deployment to the **${{ needs.deploy_to_inactive.outputs.inactive_env }}** environment is complete.
            Please perform any final validation and approve this step to switch live traffic to the new version.

  switch_traffic_to_new_env:
    name: Switch Live Traffic
    runs-on: ubuntu-latest
    needs: [wait_for_approval, deploy_to_inactive]
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Switch Traffic
        run: |
          echo "Switching live traffic to ${{ needs.deploy_to_inactive.outputs.inactive_env }}..."
          # ----------------- TO DO -----------------
          # Add your traffic switching script here.
          # Example: ssh user@load_balancer 'update_config.sh ${{ needs.deploy_to_inactive.outputs.inactive_env }}'
          echo "Traffic switched."
      - name: Update active environment marker
        run: echo "${{ needs.deploy_to_inactive.outputs.inactive_env }}" > ./.active_env

      - name: Commit updated active environment
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore(ci): set active environment to ${{ needs.deploy_to_inactive.outputs.inactive_env }}"
          file_pattern: .active_env
