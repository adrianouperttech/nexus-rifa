# Workflow para Diagnóstico de Estrutura de Arquivos

name: Diagnostic Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  diagnose-structure:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Listar todos os arquivos e pastas recursivamente
      run: ls -R
